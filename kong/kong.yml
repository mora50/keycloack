_format_version: "3.0"
_transform: true

#
# Kong DB-less declarative configuration for the Auth Trust Gateway POC.
# Loaded by Kong via:
#   KONG_DATABASE=off
#   KONG_DECLARATIVE_CONFIG=/usr/local/kong/declarative/kong.yml
# Custom plugin loaded via:
#   KONG_PLUGINS=bundled,jwt-keycloak-validator
#   KONG_LUA_PACKAGE_PATH=/opt/kong/plugins/?.lua;/opt/kong/plugins/?/init.lua;;
#
# Source of truth at design time: specs/001-auth-trust-gateway/contracts/kong.yml
#

services:

  # ---------------------------------------------------------------------------
  # FR-001/FR-002 — public, no auth plugin (login/refresh/jwks proxy).
  # ---------------------------------------------------------------------------
  - name: ms-auth
    url: http://ms-auth:8080
    routes:
      - name: auth-public
        paths:
          - /auth
        strip_path: false

  # ---------------------------------------------------------------------------
  # Protected products API — JWT validation enforced by custom plugin.
  # ---------------------------------------------------------------------------
  - name: ms-products
    url: http://ms-products:8080/products
    routes:
      - name: products-protected
        paths:
          - /api/products
        strip_path: true
        plugins:
          - name: jwt-keycloak-validator
            config:
              jwks_url: http://ms-auth:8080/auth/jwks
              issuer: http://keycloak:8080/realms/poc
              algorithm: RS256
              cache_ttl: 3600
              negative_cache_ttl: 30
              user_id_claim: sub
              user_id_header: X-User-Id
              forward_claims:
                - preferred_username
                - email
              strip_client_headers: true   # FR-010 anti-spoofing — DO NOT disable

  # ---------------------------------------------------------------------------
  # Protected payments API — same plugin, same config.
  # ---------------------------------------------------------------------------
  - name: ms-payments
    url: http://ms-payments:8080/payments
    routes:
      - name: payments-protected
        paths:
          - /api/payments
        strip_path: true
        plugins:
          - name: jwt-keycloak-validator
            config:
              jwks_url: http://ms-auth:8080/auth/jwks
              issuer: http://keycloak:8080/realms/poc
              algorithm: RS256
              cache_ttl: 3600
              negative_cache_ttl: 30
              user_id_claim: sub
              user_id_header: X-User-Id
              forward_claims:
                - preferred_username
                - email
              strip_client_headers: true

# ---------------------------------------------------------------------------
# Global CORS — allows the React POC frontend (served on http://localhost:5173
# in dev or http://localhost:3000 from the compose `frontend` service) to call
# Kong from the browser. Tighten origins for any non-POC deployment.
# ---------------------------------------------------------------------------
plugins:
  - name: cors
    config:
      origins:
        - http://localhost:5173
        - http://localhost:3000
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - X-User-Id
        - X-Claim-email
        - X-Claim-preferred_username
      exposed_headers:
        - X-User-Id
      credentials: true
      max_age: 3600
      preflight_continue: false

