server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: ms-products
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    root: INFO
    com.poc.msproducts: INFO
